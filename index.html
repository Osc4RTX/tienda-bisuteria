<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Bisutería</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f9f9f9; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #333; }
        .catalogo { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .producto { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 250px; text-align: center; }
        .producto img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
        .precio { color: #27ae60; font-weight: bold; font-size: 1.2em; }
        button { background-color: #3498db; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; }
        button:hover { background-color: #2980b9; }
        
        /* Estilos del carrito */
        .carrito-container { margin-top: 40px; background: white; padding: 20px; border-radius: 8px; max-width: 500px; margin-left: auto; margin-right: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .carrito-item { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 10px 0; }
        .btn-whatsapp { background-color: #25D366; font-size: 1.1em; font-weight: bold; }
        .btn-whatsapp:hover { background-color: #1ebe57; }
    </style>
</head>
<body>

    <h1>✨ Mi Tienda de Bisutería ✨</h1>

    <div class="catalogo">
        <div class="producto">
            <img src="https://via.placeholder.com/250x200?text=Pulsera+de+Cuarzo" alt="Pulsera">
            <h3>Pulsera de Cuarzo</h3>
            <p class="precio">$12.00</p>
            <button onclick="agregarAlCarrito('Pulsera de Cuarzo', 12)">Agregar al carrito</button>
        </div>

        <div class="producto">
            <img src="https://via.placeholder.com/250x200?text=Collar+de+Perlas" alt="Collar">
            <h3>Collar de Perlas</h3>
            <p class="precio">$25.00</p>
            <button onclick="agregarAlCarrito('Collar de Perlas', 25)">Agregar al carrito</button>
        </div>

        <div class="producto">
            <img src="https://via.placeholder.com/250x200?text=Anillo+Dorado" alt="Anillo">
            <h3>Anillo Dorado</h3>
            <p class="precio">$8.50</p>
            <button onclick="agregarAlCarrito('Anillo Dorado', 8.5)">Agregar al carrito</button>
        </div>
    </div>

    <div class="carrito-container">
        <h2>🛒 Tu Carrito</h2>
        <div id="lista-carrito">
            <p>El carrito está vacío.</p>
        </div>
        <h3 style="text-align: right;">Total: $<span id="total-carrito">0.00</span></h3>
        <button class="btn-whatsapp" onclick="enviarPedido()">Enviar Pedido por WhatsApp</button>
    </div>

    <script>
        let carrito = [];

        function agregarAlCarrito(nombre, precio) {
            // Verifica si el producto ya está en el carrito para sumar la cantidad
            let productoExistente = carrito.find(item => item.nombre === nombre);
            if (productoExistente) {
                productoExistente.cantidad++;
            } else {
                carrito.push({ nombre: nombre, precio: precio, cantidad: 1 });
            }
            actualizarCarrito();
        }

        function actualizarCarrito() {
            const listaDiv = document.getElementById('lista-carrito');
            const totalSpan = document.getElementById('total-carrito');
            
            if (carrito.length === 0) {
                listaDiv.innerHTML = '<p>El carrito está vacío.</p>';
                totalSpan.innerText = '0.00';
                return;
            }

            listaDiv.innerHTML = '';
            let total = 0;

            carrito.forEach((item, index) => {
                total += item.precio * item.cantidad;
                listaDiv.innerHTML += `
                    <div class="carrito-item">
                        <span>${item.cantidad}x ${item.nombre}</span>
                        <span>$${(item.precio * item.cantidad).toFixed(2)}</span>
                    </div>
                `;
            });

            totalSpan.innerText = total.toFixed(2);
        }

        function enviarPedido() {
            if (carrito.length === 0) {
                alert("Por favor, agrega productos al carrito antes de enviar tu pedido.");
                return;
            }

            // === CAMBIA ESTE NÚMERO ===
            // Usa el código de país sin el + (Ej: 58 para Venezuela)
            const NUMERO_TIENDA = "584120000000"; 

            let mensaje = "¡Hola! Vengo de la página web y me gustaría hacer el siguiente pedido:\n\n";
            let total = 0;

            // Arma la lista de productos para el mensaje
            carrito.forEach(item => {
                mensaje += `▪️ ${item.cantidad}x ${item.nombre} ($${(item.precio * item.cantidad).toFixed(2)})\n`;
                total += item.precio * item.cantidad;
            });

            mensaje += `\n*Total a pagar: $${total.toFixed(2)}*\n\nPor favor, indíquenme los métodos de pago.`;

            // Codifica el texto para que la URL de WhatsApp no se rompa con los espacios y saltos de línea
            const urlWhatsApp = `https://wa.me/${NUMERO_TIENDA}?text=${encodeURIComponent(mensaje)}`;
            
            // Abre WhatsApp en una nueva pestaña
            window.open(urlWhatsApp, '_blank');
        }
    </script>
</body>
</html>
